spring.application.name=EmployeeManagementSystem

logging.level.org.springframework.security=DEBUG

#Data source

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ems}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:admin}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:true}

app.jwt-secret=${JWT_SECRET:thisIsJwtKeyToGenerateTheTokenThisShouldBeMoreThen32Characters}
app.jwt-expiry=${JWT_EXPIRY:3600000}

